name: PARTH WORKFLOW
on:
  push:
    branches:
      - main
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Create file.txt
        run: echo "Hello World" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt
  job2:
    runs-on: ubuntu-latest
    needs: job1   
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Print file content
        run: cat file.txt